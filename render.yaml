services:
  - type: web
    name: group-manager-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: BotDB
      - key: OWNER_ID
        sync: false
      - key: SUDO_USERS
        value: ""
      - key: BOT_USERNAME
        sync: false
      - key: SUPPORT_GROUP
        sync: false
      - key: UPDATE_CHANNEL
        sync: false
      - key: START_IMAGE
        sync: false
      - key: PORT
        value: "8000"
      - key: WEBHOOK
        value: "False"
